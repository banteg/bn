name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync locked dependencies
        run: uv sync --locked --all-groups

      - name: Check release metadata
        run: uv run python scripts/release.py --check

      - name: Run tests
        run: uv run pytest

  package:
    name: Package smoke test
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync locked dependencies
        run: uv sync --locked --all-groups

      - name: Check release metadata
        run: uv run python scripts/release.py --check

      - name: Build distributions
        run: uv build --no-sources

      - name: Install wheel as a uv tool
        env:
          UV_TOOL_BIN_DIR: ${{ runner.temp }}/bin
          UV_TOOL_DIR: ${{ runner.temp }}/tools
        run: uv tool install dist/*.whl

      - name: Smoke-test packaged assets
        env:
          BN: ${{ runner.temp }}/bin/bn
        run: |
          "${BN}" --version
          "${BN}" plugin install --dest "${RUNNER_TEMP}/bn-plugin" --mode copy
          "${BN}" skill install --dest "${RUNNER_TEMP}/bn-skill" --mode copy
