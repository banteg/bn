name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python 3.14
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync locked dependencies
        run: uv sync --locked --all-groups

      - name: Check release metadata
        run: uv run python scripts/release.py --check

      - name: Run tests
        run: uv run pytest

      - name: Build distributions
        run: uv build

      - name: Smoke-test packaged assets
        run: |
          uv run --isolated --no-project --with dist/*.whl bn plugin install --dest "${RUNNER_TEMP}/bn-plugin" --mode copy
          uv run --isolated --no-project --with dist/*.whl bn skill install --dest "${RUNNER_TEMP}/bn-skill" --mode copy
